<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saha Satış Kataloğu</title>
  <style>
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
    body { background-color: #f4f6f8; color: #333; padding: 15px; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h2 { color: #1e293b; font-size: 20px; }
    
    .search-box { width: 100%; padding: 12px 15px; font-size: 16px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; margin-bottom: 15px; background: white; }
    .search-box:focus { border-color: #007bff; }
    
    .category-card { background: white; border-radius: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
    .category-header { width: 100%; padding: 16px; font-size: 16px; font-weight: bold; background: white; border: none; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #007bff; }
    
    .subcategory-list { display: none; padding: 10px 15px 15px 15px; background: #f8fafc; border-top: 1px solid #e2e8f0; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .subcategory-list.active { display: grid; }
    
    .product-btn { padding: 12px 10px; font-size: 14px; font-weight: 600; background: white; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; color: #334155; text-align: center; transition: all 0.2s; }
    .product-btn:active { background: #007bff; color: white; border-color: #007bff; }

    .price-display { margin-top: 20px; padding: 20px; background: white; border-radius: 12px; border: 2px solid #007bff; text-align: center; display: none; box-shadow: 0 4px 12px rgba(0,123,255,0.15); }
    .price-display.active { display: block; }
    .price-display .prod-title { font-size: 15px; color: #64748b; margin-bottom: 5px; }
    .price-display .prod-price { font-size: 28px; font-weight: bold; color: #28a745; margin: 10px 0; }
    .price-display .prod-stock { font-size: 13px; font-weight: bold; display: inline-block; padding: 4px 10px; border-radius: 6px; }
    .in-stock { background: #e6f4ea; color: #1e7e34; }
    .out-stock { background: #fce8e6; color: #d93025; }

    .loading { text-align: center; font-size: 16px; color: #666; margin-top: 30px; }
  </style>
</head>
<body>

  <div class="header">
    <h2>🎯 Ürün & Fiyat Kataloğu</h2>
  </div>

  <input type="text" id="searchInput" class="search-box" placeholder="Ürün veya kategori ara..." onkeyup="filterProducts()">

  <div id="catalogContainer">
    <div class="loading">Katalog yükleniyor...</div>
  </div>

  <div id="priceDisplay" class="price-display"></div>

  <script>
    const sheetId = '1_5EKMvh2NNaNfa32OYWQJ75OJ9SYudUbViq4jiNj7jM';
    const jsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    let catalogData = {};

    async function loadData() {
      try {
        const response = await fetch(jsonUrl);
        const text = await response.text();
        const jsonString = text.substring(47, text.length - 2);
        const data = JSON.parse(jsonString);
        const rows = data.table.rows;

        catalogData = {};

        rows.forEach(row => {
          const c = row.c;
          if (c && c[0] && c[1]) {
            const name = c[0].v ? c[0].v.toString().trim() : '';
            const category = c[1].v ? c[1].v.toString().trim().toUpperCase() : 'GENEL';
            const price = c[2] ? c[2].v : '0';
            const stock = c[3] ? parseInt(c[3].v) : 0;

            if (!catalogData[category]) {
              catalogData[category] = [];
            }
            catalogData[category].push({ name, price, stock });
          }
        });

        renderCatalog(catalogData);
      } catch (error) {
        document.getElementById("catalogContainer").innerHTML = "<div class='loading'>Veriler yüklenemedi. Lütfen internet bağlantınızı kontrol edin.</div>";
      }
    }

    function renderCatalog(data) {
      const container = document.getElementById("catalogContainer");
      container.innerHTML = "";

      if (Object.keys(data).length === 0) {
        container.innerHTML = "<div class='loading'>Ürün bulunamadı.</div>";
        return;
      }

      Object.keys(data).forEach(cat => {
        const card = document.createElement("div");
        card.className = "category-card";

        const header = document.createElement("button");
        header.className = "category-header";
        header.innerHTML = `<span>📁 ${cat}</span> <span>▼</span>`;

        const subList = document.createElement("div");
        subList.className = "subcategory-list";

        header.onclick = () => {
          document.querySelectorAll(".subcategory-list").forEach(el => {
            if (el !== subList) el.classList.remove("active");
          });
          subList.classList.toggle("active");
        };

        data[cat].forEach(prod => {
          const btn = document.createElement("button");
          btn.className = "product-btn";
          btn.innerText = prod.name;
          btn.onclick = () => showPrice(cat, prod);
          subList.appendChild(btn);
        });

        card.appendChild(header);
        card.appendChild(subList);
        container.appendChild(card);
      });
    }

    function showPrice(category, prod) {
      const display = document.getElementById("priceDisplay");
      const isStock = prod.stock > 0;

      display.innerHTML = `
        <div class="prod-title">${category} > <strong>${prod.name}</strong></div>
        <div class="prod-price">${prod.price} TL</div>
        <span class="prod-stock ${isStock ? 'in-stock' : 'out-stock'}">
          ${isStock ? 'Stokta Var (' + prod.stock + ' adet)' : 'Stok Tükendi'}
        </span>
      `;
      display.classList.add("active");
      display.scrollIntoView({ behavior: 'smooth' });
    }

    function filterProducts() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      if (!query) {
        renderCatalog(catalogData);
        return;
      }

      const filtered = {};
      Object.keys(catalogData).forEach(cat => {
        const matchingProds = catalogData[cat].filter(p => 
          p.name.toLowerCase().includes(query) || cat.toLowerCase().includes(query)
        );
        if (matchingProds.length > 0) {
          filtered[cat] = matchingProds;
        }
      });

      renderCatalog(filtered);
      // Arama yapılırken kategorileri otomatik aç
      document.querySelectorAll(".subcategory-list").forEach(el => el.classList.add("active"));
    }

    loadData();
  </script>
</body>
</html>
